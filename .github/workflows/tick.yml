name: Daily tick

# Greywater Falls advances itself one day each morning. The tick writes a new
# edition into data/ and commits it. Because Vercel is connected to this repo,
# that commit redeploys the site and the new day goes live on its own.
#
# DORMANT BY DEFAULT: until an ANTHROPIC_API_KEY repo secret is set, this job
# runs on schedule but skips cleanly (a green no-op, no failure emails). Add the
# secret to wake the town. See docs/HANDBOOK.md.

on:
  schedule:
    - cron: "0 23 * * *" # 06:00 WIB (UTC+7) - a morning paper
  workflow_dispatch: {} # also runnable by hand from the Actions tab

permissions:
  contents: write

concurrency:
  group: greywater-tick
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Is the town awake?
        id: gate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "No ANTHROPIC_API_KEY set. The town stays asleep. Add the secret to wake it."
            echo "awake=false" >> "$GITHUB_OUTPUT"
          else
            echo "awake=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.awake == 'true'
        with:
          node-version: "22"
          cache: npm

      - if: steps.gate.outputs.awake == 'true'
        run: npm ci

      - name: Advance the town
        if: steps.gate.outputs.awake == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run tick

      - name: Publish the edition
        if: steps.gate.outputs.awake == 'true'
        run: |
          git config user.name "the lake"
          git config user.email "actions@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            day=$(node -e "console.log(require('./data/world.json').dayNumber)")
            git add data
            git commit -m "town: day ${day}"
            git push
          else
            echo "Nothing to publish today; the town was quiet."
          fi
