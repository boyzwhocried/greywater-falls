name: Daily tick

# Greywater Falls advances itself one day each morning: the tick writes a new
# edition into data/, commits it, then deploys the site so the new day goes live.
#
# TWO INDEPENDENT GATES (both safe to leave unset):
#   ANTHROPIC_API_KEY  - without it the whole job is a clean green no-op (asleep).
#   VERCEL_TOKEN       - without it the day is still written + committed, but the
#                        live deploy is skipped (publish it later with
#                        `vercel deploy --prod`). With it, publishing is fully
#                        hands-off and does NOT rely on Vercel's git integration.
# See docs/HANDBOOK.md.

on:
  schedule:
    - cron: "0 23 * * *" # 06:00 WIB (UTC+7) - a morning paper
  workflow_dispatch: {} # also runnable by hand from the Actions tab

permissions:
  contents: write

concurrency:
  group: greywater-tick
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check gates
        id: gate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "No ANTHROPIC_API_KEY set. The town stays asleep. Add the secret to wake it."
            echo "awake=false" >> "$GITHUB_OUTPUT"
          else
            echo "awake=true" >> "$GITHUB_OUTPUT"
          fi
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.awake == 'true'
        with:
          node-version: "22"
          cache: npm

      - if: steps.gate.outputs.awake == 'true'
        run: npm ci

      - name: Advance the town
        if: steps.gate.outputs.awake == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run tick

      - name: Publish the edition
        id: publish
        if: steps.gate.outputs.awake == 'true'
        run: |
          git config user.name "the lake"
          git config user.email "actions@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            day=$(node -e "console.log(require('./data/world.json').dayNumber)")
            git add data
            git commit -m "town: day ${day}"
            git push
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "Nothing to publish today; the town was quiet."
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to production
        # Deterministic publish path. Runs only when a new day was written AND a
        # deploy token is set. Does NOT rely on Vercel's git integration (which
        # has proven unreliable for this project). Org/project IDs are not secret.
        if: steps.publish.outputs.published == 'true' && steps.gate.outputs.can_deploy == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_nK5v7B8Q7nJovIEG2gJn0C5J
          VERCEL_PROJECT_ID: prj_5RKKR3AFe2ujjsdAJHAhr562bhBs
        run: npx vercel deploy --prod --yes --token "$VERCEL_TOKEN"

      - name: Note if deploy was skipped
        if: steps.publish.outputs.published == 'true' && steps.gate.outputs.can_deploy == 'false'
        run: echo "A new day was committed but VERCEL_TOKEN is unset, so the live site was not redeployed. Add the secret, or run 'vercel deploy --prod' to publish."
