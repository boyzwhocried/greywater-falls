name: Daily tick

# Greywater Falls advances itself one day each morning: the tick writes a new
# edition into data/ and commits it. The repo is PUBLIC, so the push triggers
# Vercel's native git-integration build and the new day goes live on its own.
# (On a Hobby plan, a private repo blocks bot-authored commits from deploying;
# public removes that block, so no deploy token or CLI step is needed.)
#
# GATE: ANTHROPIC_API_KEY - without it the whole job is a clean green no-op.
# See docs/HANDBOOK.md.

on:
  schedule:
    - cron: "0 23 * * *" # 06:00 WIB (UTC+7) - a morning paper
  workflow_dispatch: {} # also runnable by hand from the Actions tab

permissions:
  contents: write

concurrency:
  group: greywater-tick
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 12 # hard cap; the tick is ~1-2 min, so this only bites on a hang
    steps:
      - uses: actions/checkout@v4

      - name: Check gate
        id: gate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "No ANTHROPIC_API_KEY set. The town stays asleep. Add the secret to wake it."
            echo "awake=false" >> "$GITHUB_OUTPUT"
          else
            echo "awake=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.awake == 'true'
        with:
          node-version: "22"
          cache: npm

      - if: steps.gate.outputs.awake == 'true'
        run: npm ci

      - name: Advance the town
        if: steps.gate.outputs.awake == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run tick

      - name: Publish the edition
        # The push triggers Vercel's git-integration build automatically (repo is
        # public), so the committed day goes live with no further step.
        if: steps.gate.outputs.awake == 'true'
        run: |
          git config user.name "the lake"
          git config user.email "actions@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            day=$(node -e "console.log(require('./data/world.json').dayNumber)")
            git add data
            git commit -m "town: day ${day}"
            git push
          else
            echo "Nothing to publish today; the town was quiet."
          fi
